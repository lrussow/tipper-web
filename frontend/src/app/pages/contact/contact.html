<div class="contact-page">
  <!-- Page Header -->
  <section class="page-header">
    <h1>Contact Us</h1>
    <p>Have a question or want to get started? We'd love to hear from you.</p>
  </section>

  <div class="contact-body">
    <!-- Contact Info + Map -->
    <div class="contact-info-side">
      <div class="info-card">
        <h2>Get in Touch</h2>
        <div class="info-item">
          <span class="info-icon">📧</span>
          <div>
            <strong>Email</strong>
            <a id="contact-email" href="mailto:lrussow@gmail.com">lrussow&#64;gmail.com</a>
          </div>
        </div>
        <div class="info-item">
          <span class="info-icon">📞</span>
          <div>
            <strong>Phone</strong>
            <a id="contact-phone" href="tel:+16046940454">(604) 694-0454</a>
          </div>
        </div>
        <div class="info-item">
          <span class="info-icon">🌐</span>
          <div>
            <strong>Web</strong>
            <a id="contact-website" href="https://www.the-tipper.com" target="_blank" rel="noopener">www.the-tipper.com</a>
          </div>
        </div>
      </div>
    </div>

    <!-- Contact Form -->
    <div class="form-side">
      <div class="form-card">
        <h2>Send a Message</h2>

        @if (vm.submitted) {
          <div id="success-message" class="success-banner">
            <span>✅</span>
            <p>Thanks! We'll be in touch shortly.</p>
          </div>
        } @else {
          <form id="contact-form" (ngSubmit)="vm.onSubmit()" #contactForm="ngForm">
            <div class="form-group">
              <label for="contact-name">Name</label>
              <input
                id="contact-name"
                type="text"
                name="name"
                [(ngModel)]="vm.form.name"
                required
                placeholder="Your name"
                autocomplete="name"
              />
            </div>

            <div class="form-group">
              <label for="contact-email-input">Email</label>
              <input
                id="contact-email-input"
                type="email"
                name="email"
                [(ngModel)]="vm.form.email"
                required
                placeholder="your@email.com"
                autocomplete="email"
              />
            </div>

            <div class="form-group">
              <label for="contact-message">Message</label>
              <textarea
                id="contact-message"
                name="message"
                [(ngModel)]="vm.form.message"
                required
                rows="5"
                placeholder="How can we help?"
              ></textarea>
            </div>

            @if (vm.error) {
              <div id="error-message" class="error-banner">{{ vm.error }}</div>
            }

            <button
              id="contact-submit"
              type="submit"
              class="btn-submit"
              [disabled]="vm.submitting || !contactForm.valid"
            >
              {{ vm.submitting ? 'Sending...' : 'Send Message' }}
            </button>
          </form>
        }
      </div>
    </div>
  </div>
</div>
