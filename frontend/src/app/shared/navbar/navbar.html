<nav class="navbar" [class.open]="menuOpen">
  <div class="navbar-brand">
    <a routerLink="/" id="nav-logo">
      <img src="logo.svg" alt="The Tipper logo" class="brand-logo" />
      <span class="brand-name">The Tipper</span>
    </a>
  </div>
  <button id="nav-menu-toggle" class="hamburger" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen" aria-label="Toggle navigation">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <ul class="nav-links">
    <li>
      <a id="nav-home" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    </li>
    <li>
      <a id="nav-contact" routerLink="/contact" routerLinkActive="active">Contact</a>
    </li>
    <li>
      <a id="nav-account" [routerLink]="isSignedIn ? '/account' : '/login'" routerLinkActive="active">Account</a>
    </li>
    @if (isSignedIn) {
      <li>
        <button id="nav-signout" class="nav-signout-btn" (click)="signOut()">Sign Out</button>
      </li>
    }
  </ul>
</nav>
